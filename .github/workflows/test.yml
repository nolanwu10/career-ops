name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install classic dependencies
        run: npm install
        working-directory: classic
      - name: Test classic
        run: node test-all.mjs --quick
        working-directory: classic
      - name: Install desktop dependencies
        run: npm install
        working-directory: apps/desktop
      - name: Check desktop
        run: npm run check
        working-directory: apps/desktop
      - name: Test desktop
        run: npm test
        working-directory: apps/desktop
